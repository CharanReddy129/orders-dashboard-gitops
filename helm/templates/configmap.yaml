apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orders-dashboard.configMapName" . }}
  namespace: {{ include "orders-dashboard.namespace" .  }}
  labels:
    {{- include "orders-dashboard.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.backend.env.APP_ENV | quote }}
  LOG_LEVEL: {{ .Values.backend.env.LOG_LEVEL | quote }}

  VITE_API_BASE_URL: {{ .Values.frontend.env.VITE_API_BASE_URL | quote }}
  VITE_API_PROXY_TARGET: "http://{{ .Values.backend.service.name }}:8080"

